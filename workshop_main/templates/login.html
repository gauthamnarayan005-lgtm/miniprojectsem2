{% extends 'base.html' %}

{% block content %}
<style>
    /* Modern Authentication UI */
    .auth-section {
        min-height: 85vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #f4f7f6; /* Soft background to make the card pop */
        padding: 40px 20px;
        margin-top: 60px; /* Accounts for fixed navbar */
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .auth-card {
        background: #ffffff;
        border-radius: 16px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        padding: 45px 40px;
        width: 100%;
        max-width: 450px;
        border-top: 5px solid #007bff; /* Brand color accent */
    }
    
    .auth-title {
        text-align: center;
        color: #2b3a4a;
        font-size: 2.2rem;
        font-weight: 800;
        margin-bottom: 10px;
    }
    
    .auth-subtitle {
        text-align: center;
        color: #718096;
        margin-bottom: 30px;
        font-size: 0.95rem;
    }

    /* Target Django's auto-generated form elements */
    .auth-form p {
        margin-bottom: 20px;
    }
    
    .auth-form label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #4a5568;
        font-size: 0.95rem;
    }
    
    .auth-form input[type="text"],
    .auth-form input[type="password"],
    .auth-form input[type="email"] {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid #cbd5e0;
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s ease;
        background-color: #f8fafc;
        box-sizing: border-box;
    }
    
    .auth-form input:focus {
        outline: none;
        border-color: #007bff;
        box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15);
        background-color: #ffffff;
    }
    
    .auth-btn {
        width: 100%;
        background-color: #007bff;
        color: white;
        border: none;
        padding: 14px;
        font-size: 1.1rem;
        font-weight: 700;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 15px;
        box-shadow: 0 4px 10px rgba(0, 123, 255, 0.2);
    }
    
    .auth-btn:hover {
        background-color: #0056b3;
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(0, 123, 255, 0.3);
    }
    
    .auth-links {
        text-align: center;
        margin-top: 25px;
        font-size: 0.95rem;
        color: #718096;
        border-top: 1px solid #edf2f7;
        padding-top: 20px;
    }
    
    .auth-links a {
        color: #e63946; /* Catchy accent color */
        font-weight: 600;
        text-decoration: none;
        transition: color 0.3s;
    }
    
    .auth-links a:hover {
        color: #c1121f;
        text-decoration: underline;
    }
    
    /* Handle Django's built-in help text and error lists */
    .helptext {
        font-size: 0.8rem;
        color: #a0aec0;
        margin-top: 5px;
        display: block;
    }
    
    .errorlist {
        color: #e53e3e;
        background-color: #fff5f5;
        border-left: 4px solid #e53e3e;
        list-style: none;
        padding: 10px 15px;
        font-size: 0.9rem;
        margin-bottom: 15px;
        border-radius: 4px;
    }
</style>

<section class="auth-section">
    <div class="auth-card">
        <h2 class="auth-title">Welcome Back</h2>
        <p class="auth-subtitle">Sign in to manage your workshop appointments.</p>
        
        <form method="POST" class="auth-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="auth-btn">Sign In</button>
        </form>
        
        <div class="auth-links">
            <p>Don't have an account? <a href="{% url 'accounts:register' %}">Register here</a></p>
        </div>
    </div>
</section>
{% endblock %}
