{% extends 'base.html' %}
{% block content %}
<section class="section">
    <div class="section-container" style="max-width: 600px; margin: 0 auto; margin-top: 50px;">
        <div class="contact-form">
            <h2 class="section-title" style="font-size: 32px; text-align: center;">Book a Service</h2>
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="submit-btn" style="margin-top: 20px;">Submit Booking</button>
            </form>
        </div>
    </div>
</section>
{% endblock %}
